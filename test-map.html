<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Singapore Planning Area Diversity Map</title>

<link
    rel="stylesheet"
    href="https://www.onemap.gov.sg/web-assets/libs/leaflet/leaflet.css"
/>

<script src="https://www.onemap.gov.sg/web-assets/libs/leaflet/onemap-leaflet.js"></script>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
    }

    h1 {
        margin: 15px;
    }

    #mapdiv {
        height: 800px;
    }

    .index-control {
        background: white;
        padding: 10px 12px;
        border-radius: 5px;
        box-shadow: 0 1px 5px rgba(0, 0, 0, 0.4);
        font-size: 14px;
    }

    .index-control label {
        display: block;
        font-weight: bold;
        margin-bottom: 6px;
    }

    .index-control select {
        width: 240px;
        padding: 6px;
        font-size: 14px;
    }

    .map-legend {
        background: white;
        padding: 10px 12px;
        border-radius: 5px;
        box-shadow: 0 1px 5px rgba(0, 0, 0, 0.4);
        line-height: 21px;
        font-size: 13px;
    }

    .map-legend-title {
        font-weight: bold;
        margin-bottom: 7px;
        max-width: 220px;
    }

    .legend-colour {
        display: inline-block;
        width: 18px;
        height: 18px;
        margin-right: 6px;
        vertical-align: middle;
        border: 1px solid #777;
    }

    .popup-container {
        min-width: 280px;
    }

    .popup-container h3 {
        margin-top: 0;
        margin-bottom: 10px;
    }

    .popup-container p {
        margin-top: 8px;
        margin-bottom: 8px;
    }
</style>
</head>

<body>
<h1>Singapore Planning Area Diversity Map</h1>

<div id="mapdiv"></div>

<script>
    /*
        Required files in the same folder:

        index.html
        singapore_planning_areas_polygon.geojson
        planning_area_diversity.json
    */


    // ---------------------------------------------------------
    // 1. Create the map
    // ---------------------------------------------------------

    const sw = L.latLng(1.144, 103.535);
    const ne = L.latLng(1.494, 104.502);
    const singaporeBounds = L.latLngBounds(sw, ne);

    const defaultCenter = [1.3521, 103.8198];
    const defaultZoom = 12;

    const map = L.map("mapdiv", {
        center: defaultCenter,
        zoom: defaultZoom,
        minZoom: 11,
        maxZoom: 19,
        maxBounds: singaporeBounds
    });

    map.on("click", function () {
        map.closePopup();

        map.setView(defaultCenter, defaultZoom, {
            animate: true
        });
    });


    // ---------------------------------------------------------
    // 2. Add the OneMap grey basemap
    // ---------------------------------------------------------

    const basemap = L.tileLayer(
        "https://www.onemap.gov.sg/maps/tiles/Grey/{z}/{x}/{y}.png",
        {
            detectRetina: true,
            maxZoom: 19,
            minZoom: 11,

            /** DO NOT REMOVE the OneMap attribution below **/
            attribution:
            '<img src="https://www.onemap.gov.sg/web-assets/images/logo/om_logo.png" ' +
            'style="height:20px;width:20px;"/>&nbsp;' +
            '<a href="https://www.onemap.gov.sg/" target="_blank" ' +
            'rel="noopener noreferrer">OneMap</a>&nbsp;&copy;&nbsp;' +
            'contributors&nbsp;&#124;&nbsp;' +
            '<a href="https://www.sla.gov.sg/" target="_blank" ' +
            'rel="noopener noreferrer">Singapore Land Authority</a>'
        }
    );

    basemap.addTo(map);


    // ---------------------------------------------------------
    // 3. Diversity variables available in the dropdown
    // ---------------------------------------------------------

    const diversityIndices = {
        Household_F_mean: {
            label: "Household income diversity"
        },

        HousingType_F_mean: {
            label: "Housing-type diversity"
        },

        neighbourhood_diversity_mean: {
            label: "Perceived neighbourhood diversity"
        },

        neighbourhood_interact_diversity_mean: {
            label: "Neighbourhood interaction diversity"
        }
    };


    // Initially use household income diversity for colouring
    let selectedIndex = "Household_F_mean";

    // These variables will be filled after the files are loaded
    let diversityLookup = {};
    let planningAreaLayer = null;
    let currentBreaks = [];


    // Five colours from low to high
    const colourThemes = {
        Household_F_mean: [
            "#fff5eb",
            "#fdd0a2",
            "#fdae6b",
            "#e6550d",
            "#a63603"
        ],

        HousingType_F_mean: [
            "#eff3ff",
            "#bdd7e7",
            "#6baed6",
            "#3182bd",
            "#08519c"
        ],

        neighbourhood_diversity_mean: [
            "#f2f0f7",
            "#cbc9e2",
            "#9e9ac8",
            "#756bb1",
            "#54278f"
        ],

        neighbourhood_interact_diversity_mean: [
            "#edf8e9",
            "#bae4b3",
            "#74c476",
            "#31a354",
            "#006d2c"
        ]
    };

    function getCurrentColourScale() {
        return colourThemes[selectedIndex] ?? colourThemes.Household_F_mean;
    }

    // Grey for missing data
    const noDataColour = "#bdbdbd";




    // ---------------------------------------------------------
    // 4. Helper functions
    // ---------------------------------------------------------

    function normaliseAreaName(value) {
        return String(value ?? "")
            .trim()
            .toUpperCase();
    }


    function isValidNumber(value) {
        return (
            value !== null &&
            value !== undefined &&
            value !== "" &&
            Number.isFinite(Number(value))
        );
    }


    function formatNumber(value) {
        if (!isValidNumber(value)) {
            return "No data";
        }

        return Number(value).toFixed(2);
    }


    function formatMean(mean) {
        if (!isValidNumber(mean)) {
            return "No data";
        }

        return Number(mean).toFixed(2);
    }


    // ---------------------------------------------------------
    // 5. Calculate quantile colour breaks
    // ---------------------------------------------------------

    function calculateQuantileBreaks(variableName) {
        const values = Object.values(diversityLookup)
            .map(function (row) {
            return row[variableName];
            })
            .filter(function (value) {
            return isValidNumber(value);
            })
            .map(function (value) {
            return Number(value);
            })
            .sort(function (a, b) {
            return a - b;
            });

        if (values.length === 0) {
            return [];
        }

        function quantile(probability) {
            const position = (values.length - 1) * probability;
            const lowerIndex = Math.floor(position);
            const upperIndex = Math.ceil(position);

            if (lowerIndex === upperIndex) {
            return values[lowerIndex];
            }

            const proportion = position - lowerIndex;

            return (
            values[lowerIndex] +
            proportion *
            (values[upperIndex] - values[lowerIndex])
            );
        }

        return [
            quantile(0.20),
            quantile(0.40),
            quantile(0.60),
            quantile(0.80)
        ];
    }


    // ---------------------------------------------------------
    // 6. Return a colour for each value
    // ---------------------------------------------------------

    function getColour(value) {
        if (!isValidNumber(value)) {
            return noDataColour;
        }

        const colourScale = getCurrentColourScale();
        const number = Number(value);

        if (currentBreaks.length !== 4) {
            return colourScale[2];
        }

        if (number <= currentBreaks[0]) {
            return colourScale[0];
        }

        if (number <= currentBreaks[1]) {
            return colourScale[1];
        }

        if (number <= currentBreaks[2]) {
            return colourScale[2];
        }

        if (number <= currentBreaks[3]) {
            return colourScale[3];
        }

        return colourScale[4];
    }


    // ---------------------------------------------------------
    // 7. Polygon style
    // ---------------------------------------------------------

    function polygonStyle(feature) {
        const planningArea = normaliseAreaName(
            feature.properties?.planning_area ??
            feature.properties?.pln_area_n
        );

        const areaData = diversityLookup[planningArea];
        const value = areaData?.[selectedIndex];

        return {
            color: "#333333",
            weight: 1.3,
            opacity: 1,
            fillColor: getColour(value),
            fillOpacity: 0.72
        };
    }


    // ---------------------------------------------------------
    // 8. Popup content
    // ---------------------------------------------------------

    function createPopupContent(planningArea, areaData) {
        if (!areaData) {
            return `
            <div class="popup-container">
                <h3>${planningArea}</h3>
                <p>
                    No diversity data are available for this
                    planning area.
                </p>
            </div>
            `;
        }

        return `
            <div class="popup-container">
            <h3>${planningArea}</h3>

            <p>
                <strong>Household income diversity: </strong> ${formatMean(areaData.Household_F_mean)}
            </p>

            <p>
                <strong>Housing-type diversity: </strong> ${formatMean(areaData.HousingType_F_mean)}
            </p>

            <p>
                <strong>Perceived neighbourhood diversity mean: </strong> ${formatMean(areaData.neighbourhood_diversity_mean)}
            </p>

            <p>
                <strong>Neighbourhood interaction diversity mean: </strong>${formatMean(areaData.neighbourhood_interact_diversity_mean)}
            </p>

            <p>
                <strong>Sample size:</strong>
                ${
                    isValidNumber(areaData.n)
                        ? Number(areaData.n)
                        : "No data"
                }
            </p>
            </div>
        `;
    }


    // ---------------------------------------------------------
    // 9. Add tooltip, popup and hover behaviour
    // ---------------------------------------------------------

    function onEachPlanningArea(feature, layer) {
        const planningArea = normaliseAreaName(
            feature.properties?.planning_area ??
            feature.properties?.pln_area_n
        );

        const displayName =
            planningArea || "Unknown planning area";

        const areaData = diversityLookup[planningArea];

        layer.bindTooltip(
            `<strong>${displayName}</strong>`,
            {
            sticky: true,
            direction: "top"
            }
        );

        layer.bindPopup(
            createPopupContent(displayName, areaData)
        );

        layer.on({
            mouseover: function (event) {
            event.target.setStyle({
                color: "#000000",
                weight: 3,
                fillOpacity: 0.9
            });

            event.target.bringToFront();
            },

            mouseout: function (event) {
            if (planningAreaLayer) {
                planningAreaLayer.resetStyle(event.target);
            }
            },

            click: function (event) {
                if (event.originalEvent) {
                    L.DomEvent.stopPropagation(event.originalEvent);
                }

                map.fitBounds(event.target.getBounds(), {
                    padding: [20, 20],
                    maxZoom: 14
                });
            }
        });
    }


    // ---------------------------------------------------------
    // 10. Add dropdown control
    // ---------------------------------------------------------

    const indexControl = L.control({
        position: "topright"
    });

    indexControl.onAdd = function () {
        const container = L.DomUtil.create(
            "div",
            "index-control"
        );

        const options = Object.entries(diversityIndices)
            .map(function ([variableName, settings]) {
            return `
                <option value="${variableName}">
                    ${settings.label}
                </option>
            `;
            })
            .join("");

        container.innerHTML = `
            <label for="index-select">
            Colour polygons by:
            </label>

            <select id="index-select">
            ${options}
            </select>
        `;

        L.DomEvent.disableClickPropagation(container);
        L.DomEvent.disableScrollPropagation(container);

        return container;
    };

    indexControl.addTo(map);


    // ---------------------------------------------------------
    // 11. Add legend
    // ---------------------------------------------------------

    const legend = L.control({
        position: "bottomright"
    });

    legend.onAdd = function () {
        const container = L.DomUtil.create(
            "div",
            "map-legend"
        );

        container.id = "map-legend-content";

        return container;
    };

    legend.addTo(map);


    function updateLegend() {
        const legendContainer = document.getElementById(
            "map-legend-content"
        );

        if (!legendContainer) {
            return;
        }

        const label =
            diversityIndices[selectedIndex]?.label ??
            selectedIndex;

        const colourScale = getCurrentColourScale();

        if (currentBreaks.length !== 4) {
            legendContainer.innerHTML = `
            <div class="map-legend-title">
                ${label}
            </div>

            <div>
                No valid data
            </div>

            <div>
                <span
                    class="legend-colour"
                    style="background:${noDataColour};"
                ></span>
                No data
            </div>
            `;

            return;
        }

        legendContainer.innerHTML = `
            <div class="map-legend-title">
            ${label}
            </div>

            <div>
            <span
                class="legend-colour"
                style="background:${colourScale[0]};"
            ></span>
            ≤ ${currentBreaks[0].toFixed(2)}
            </div>

            <div>
            <span
                class="legend-colour"
                style="background:${colourScale[1]};"
            ></span>
            &gt; ${currentBreaks[0].toFixed(2)}
            to
            ${currentBreaks[1].toFixed(2)}
            </div>

            <div>
            <span
                class="legend-colour"
                style="background:${colourScale[2]};"
            ></span>
            &gt; ${currentBreaks[1].toFixed(2)}
            to
            ${currentBreaks[2].toFixed(2)}
            </div>

            <div>
            <span
                class="legend-colour"
                style="background:${colourScale[3]};"
            ></span>
            &gt; ${currentBreaks[2].toFixed(2)}
            to
            ${currentBreaks[3].toFixed(2)}
            </div>

            <div>
            <span
                class="legend-colour"
                style="background:${colourScale[4]};"
            ></span>
            &gt; ${currentBreaks[3].toFixed(2)}
            </div>

            <div>
            <span
                class="legend-colour"
                style="background:${noDataColour};"
            ></span>
            No data
            </div>
        `;
    }


    // ---------------------------------------------------------
    // 12. Recolour polygons when dropdown changes
    // ---------------------------------------------------------

    function updateMapColours() {
        currentBreaks =
            calculateQuantileBreaks(selectedIndex);

        if (planningAreaLayer) {
            planningAreaLayer.setStyle(polygonStyle);
        }

        updateLegend();
    }


    // ---------------------------------------------------------
    // 13. Load GeoJSON and diversity data
    // ---------------------------------------------------------

    Promise.all([
        fetch("./singapore_planning_areas_polygon.geojson")
            .then(function (response) {
            if (!response.ok) {
                throw new Error(
                    "Planning-area GeoJSON could not be loaded. " +
                    `HTTP status: ${response.status}`
                );
            }

            return response.json();
            }),

        fetch("./planning_area_diversity.json")
            .then(function (response) {
            if (!response.ok) {
                throw new Error(
                    "Diversity JSON could not be loaded. " +
                    `HTTP status: ${response.status}`
                );
            }

            return response.json();
            })
    ])
    .then(function ([geojsonData, diversityData]) {

        // Create a lookup object using planning-area names
        diversityData.forEach(function (row, index) {
            const planningArea = normaliseAreaName(
            row["Planning Area"]
            );

            if (planningArea === "") {
            console.warn(
                `Skipping diversity row ${index + 1} ` +
                "because Planning Area is blank:",
                row
            );

            return;
            }

            diversityLookup[planningArea] = row;
        });


        // Calculate initial colour groups
        currentBreaks =
            calculateQuantileBreaks(selectedIndex);


        // Create the planning-area polygons
        planningAreaLayer = L.geoJSON(
            geojsonData,
            {
                style: polygonStyle,
                onEachFeature: onEachPlanningArea
            }
        ).addTo(map);


        // Show all planning areas
        map.setView(defaultCenter, defaultZoom);


        // Set up dropdown
        const indexSelect =
            document.getElementById("index-select");

        indexSelect.value = selectedIndex;

        indexSelect.addEventListener(
            "change",
            function (event) {
            selectedIndex = event.target.value;
            updateMapColours();
            }
        );


        // Show initial legend
        updateLegend();
    })
    .catch(function (error) {
        console.error(
            "Map loading error:",
            error
        );

        alert(
            "The map data could not be loaded:\n\n" +
            error.message
        );
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Singapore Planning Area Diversity Map</title> <!-- browser tab title -->

    <link
        rel="stylesheet"
        href="https://www.onemap.gov.sg/web-assets/libs/leaflet/leaflet.css"
    />

    <script src="https://www.onemap.gov.sg/web-assets/libs/leaflet/onemap-leaflet.js"></script>

    <style>
        /* ===========
        PAGE LAYOUT
        =========== */

        /* make the page fill the browser window */
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        h1 { /* main header style applied to h1 */
            height: 56px; /* = 16px padding + 40px line-height */
            box-sizing: border-box; /* specific the size of final element including padding, content-box to exclude margin and padding */
            margin: 0;
            padding: 8px 12px; /* top and bottom padding = 8px, left and right padding = 12px */
            font-size: 28px;
            line-height: 40px; /* line spacing */
            text-align: center;
        }

        
        #main-layout { /* define the layout of the page */
            display: flex;
            width: 100%;
            height: calc(100vh - 56px);
        }

        #mapdiv { /* define the size of the map container */
            flex: 1; /* take up the remaining space - after the left panel */
            width: auto;
            height: 100%;
            min-width: 0;
        }

        /* ============
        DROPDOWN BOX
        ============ */

        .index-control { 
            background: white;
            padding: 10px 12px;
            border-radius: 5px; /* the box curve */
            box-shadow: 0 1px 5px rgba(0, 0, 0, 0.4); /* no horizontal movement, 1px downward movement, 5px blur amount, 40% opacity*/
            font-size: 14px;
            width: 250px;
        }

        .index-control label { /* title */
            display: block;
            font-weight: bold;
            margin-bottom: 6px;
        }

        .index-control select { /* option */
            width: 240px;
            padding: 6px;
        }

        /* =================
        MAP COLOUR LEGEND
        ================= */

        .map-legend { /* when dropdown chosen */
            background: white;
            padding: 10px 12px;
            border-radius: 5px;
            box-shadow: 0 1px 5px rgba(0, 0, 0, 0.4);
            line-height: 21px;
            font-size: 14px;
        }

        .map-legend-title { /* title */
            font-weight: bold;
            margin-bottom: 6px;
            width: 250px;
        }

        .legend-colour { /* color box in the legend*/
            display: inline-block;
            width: 18px;
            height: 18px;
            margin-right: 6px;
            vertical-align: middle;
            border: 1px solid #777;
        }

        /* =================
        MOUSEOVER - POPUP
        ================= */

        .popup-container { 
            min-width: 280px;
        }

        .popup-container h3 { /* neighbourhood name */
            margin-top: 0;
            margin-bottom: 10px;
        }

        .popup-container p { /* diversity index */
            margin-top: 8px;
            margin-bottom: 8px;
        }

        /* ===============
        LEFT INFO PANEL
        =============== */

        
        /* Fixed-width side panel that displays values for the selected area. */
        .info-panel { /* the size and position of the info panel */
            width: 420px;
            min-width: 420px;
            height: 100%;

            overflow-y: auto; /* automatically add vertical scrolling*/
            box-sizing: border-box;
            padding: 24px;

            background: rgba(255, 255, 255, 0.98);
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.16);
            z-index: 1000;
        }


        .area-title {
            margin: 0 0 14px ;
            font-size: 22px;  /*font size of area name in side list*/
            text-align: center;
            font-weight: 700;
            text-transform: uppercase;
            color: #111111;
        }

        .selected-measure-note { /* currently displaying */
            margin: 0 0 18px;
            padding: 12px 14px;
            background: #eef4f7;
            border-radius: 6px;
            color: #17384d;
            line-height: 1.3;
            font-size: 16px;
        }

        .metric-card { /* expandable card for each measure */
            margin-bottom: 12px;
            padding: 12px;
            background: #ffffff;
            border: 1px solid #e3e8eb;
            border-radius: 8px;
        }

        .metric-card.highlighted { /* highlight the chosen diversity index */
            border-color: #7da6bf;
            box-shadow: 0 0 0 2px rgba(125, 166, 191, 0.15);
        }

        .metric-header {
            width: 100%;
            display: flex;
            align-items: center; /* horizontal */
            justify-content: space-between; /* vertically align the header and the arrow */
            gap: 12px;
            padding: 0;
            border: 0;
            background: transparent;
            cursor: pointer; /* change the cursor to hand to show it is clickable */
            text-align: left;
            color: inherit;
            font: inherit;
        }

        .metric-header .metric-title {
            margin: 0;
        }

        .metric-chevron { /* the arrow */
            flex: 0 0 auto;
            font-size: 22px;
            line-height: 1;
            color: #456779;
            transition: transform 0.2s ease;
        }

        .metric-card.expanded .metric-chevron { /* rotate the arrow when expanded */
            transform: rotate(90deg);
        }

        .metric-details {
            display: none;
            padding-top: 6px;
        }

        .metric-card.expanded .metric-details {
            display: block;
        }

        .metric-title { /* the variable - shown when expended*/
            margin: 0 0 6px;
            font-size: 18px;
            font-weight: 700;
            color: #12344d;
        }

        .metric-value-line {
            margin: 0;
            font-size: 15px;
            line-height: 1;
            color: #23485f;
        }

        .metric-value-line strong {
            font-size: 16px;
        }

        /* Wrapper for the range bar and its position markers. */
        .metric-bar-wrap {
            position: relative;
            margin: 12px 0 6px;
            padding-top: 12px;
        }

        .metric-bar {
            height: 14px;
            width: 100%;
            border-radius: 999px;
            background: linear-gradient(90deg, #9b1d2b 0%, #d89c6c 30%, #ebe6b5 50%, #99b9a0 72%, #2f5f87 100%);
        }

        /* Black marker showing the selected area's position within the full range. */
        .metric-marker {
            position:absolute; 
            top: 18px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #111111;
            border: 3px solid #ffffff;
            box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.2);
            transform: translate(-50%, -50%);
        }

        /* Brown marker showing the position of the area currently under the cursor. */
        .metric-hover-marker {
            position:absolute;
            top: 18.5px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #8f6f5a;
            opacity: 0.6;
            border: 2px solid #ffffff;
            box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.2);
            display: none;
            z-index: 2;
            transform: translate(-50%, -50%);
        }

        .metric-position-label {
            margin: 0 0 8px;
            text-align: center;
            font-size: 14px;
            color: #12344d;
        }

        .metric-scale { /* the min and max range */
            display: flex;
            justify-content: space-between;
            gap: 12px;
            font-size: 14px;
            color: #8da2b8;
        }

        .metric-scale span:last-child {
            text-align: right; /* the final span to right (the max) */
        }

        .simple-measure-row { /* the sample size measure*/
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            padding: 14px 2px 0;
            border-top: 1px solid #e3e8eb;
            font-size: 18px;
            font-weight: bold;
            color: #23485f;
        }

        .simple-measure-row strong { /* sample size value */
            color: #12344d;
            font-size: 18px;
        }

        .info-panel-empty { /* when no neighbourhood is clicked */
            color: #667985;
            line-height: 1.5;
        }

        .page-header {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 56px;
            padding: 0 24px;
            box-sizing: border-box;
        }

        .page-header h1 {
            margin: 0;
            text-align: center;
        }

        .download-icon {
            position: absolute;
            right: 24px;

            display: flex;
            align-items: center;
            justify-content: center;

            width: 34px;
            height: 34px;
            padding: 0;

            border: 1px solid #d4dde3;
            border-radius: 6px;
            background-color: white;
            color: #12344d;
            text-decoration: none;
        }

        .download-icon:hover {
            background-color: #eef3f6;
        }

    </style>
</head>

    <body>
        <div class="page-header">
            <h1>Singapore Planning Area Diversity Map</h1>

            <a
                href="neighbourhood_data.xlsx"
                download="neighbourhood_data"
                class="download-icon"
                title="Download neighbourhood data"
            >
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    aria-hidden="true"
                >
                    <path
                        d="M12 3v12m0 0 5-5m-5 5-5-5M5 19h14"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    />
                </svg>
            </a>
        </div>

        <div id="main-layout"> <!-- outer container -->
            <div id="info-panel" class="info-panel" aria-live="polite">
                <h2 id="info-panel-title" class="area-title">
                    Neighbourhood details
                </h2>

                <div id="info-panel-content" class="info-panel-empty">
                    Click a planning area on the map to view where its values
                    fall within the overall range.
                </div>
            </div>

            <div id="mapdiv"></div>
        </div>


    

    <script>
        /*
            Required files in the same folder:

            index.html
            singapore_planning_areas_polygon.geojson
            planning_area_diversity.json
        */


        // ---------------------------------------------------------
        // 1. Create the map
        // ---------------------------------------------------------

        

        // Fallback centre and zoom used when the map is first created.
        const defaultCenter = [1.3311, 103.8198];
        const defaultZoom = 11.75;

        const map = L.map("mapdiv", {
            center: defaultCenter,
            zoom: defaultZoom,
            minZoom: 11,
            maxZoom: 19,
            zoomSnap: 0.25,
            zoomDelta: 0.25
        });

        // Clicking empty map space clears the selected polygon and restores the default view.
        map.on("click", function (event) {
            const originalTarget =
                event.originalEvent?.target;

            // Do not run the blank-map reset when the click came from a polygon.
            if (
                originalTarget &&
                originalTarget.classList?.contains(
                    "leaflet-interactive"
                )
            ) {
                return;
            }

            map.closePopup();

            if (selectedPolygonLayer) {
                planningAreaLayer.resetStyle(
                    selectedPolygonLayer
                );

                selectedPolygonLayer = null;
            }

            setViewFromTopLeft();
        });

        // Ask Leaflet to recalculate the map dimensions after layout changes.
        function refreshMapSize() {
            setTimeout(function () {
                map.invalidateSize();
            }, 150);
        }

        // Geographic point that should stay near the top-left of the visible map.
        const fixedTopLeftCoordinate = L.latLng(1.494080, 103.603888);

        // Recalculate the map centre so Singapore is framed consistently on different screen widths.
        function setViewFromTopLeft() {
            map.invalidateSize();

            const mapWidth =
                map.getContainer().clientWidth;

            let responsiveZoom;

            if (mapWidth >= 1800) {
                responsiveZoom = 12.50;
            } else if (mapWidth >= 1500) {
                responsiveZoom = 12.00;
            } else if (mapWidth >= 900) {
                responsiveZoom = 11.75;
            } else {
                responsiveZoom = 11.50;
            }

            const mapSize = map.getSize();

            const topLeftPoint = map.project(
                fixedTopLeftCoordinate,
                responsiveZoom
            );

            const centrePoint = topLeftPoint.add([
                mapSize.x / 2,
                mapSize.y / 2
            ]);

            const centreCoordinate = map.unproject(
                centrePoint,
                responsiveZoom
            );

            map.setView(
                centreCoordinate,
                responsiveZoom,
                {
                    animate: true
                }
            );
        }

        
        // ---------------------------------------------------------
        // 2. Add the OneMap grey basemap
        // ---------------------------------------------------------

        const basemap = L.tileLayer(
            "https://www.onemap.gov.sg/maps/tiles/Grey/{z}/{x}/{y}.png",
            {
                detectRetina: true,
                maxZoom: 19,
                minZoom: 11
            }
        );

        basemap.addTo(map);
        
        setTimeout(function () {
            map.invalidateSize();
        }, 300);

        // ---------------------------------------------------------
        // 3. Diversity variables available in the dropdown
        // ---------------------------------------------------------

        // Measures available for polygon colouring in the dropdown.
        const diversityIndices = {
            Household_F_mean: {
                label: "Household income diversity"
            },

            HousingType_F_mean: {
                label: "Housing-type diversity"
            },

            neighbourhood_diversity_mean: {
                label: "Perceived neighbourhood diversity"
            },

            neighbourhood_interact_diversity_mean: {
                label: "Neighbourhood interaction diversity"
            }
        };


        // Initially use household income diversity for colouring
        let selectedIndex = "";

        // These variables will be filled after the files are loaded
        let diversityLookup = {};
        let planningAreaLayer = null;
        let currentBreaks = [];

        let polygonWasClicked = false;

        // Five colours from low to high
        // One five-colour palette for each map measure, ordered from low to high.
        const colourThemes = {
            Household_F_mean: [
                "#fff5eb",
                "#fdd0a2",
                "#fdae6b",
                "#e6550d",
                "#a63603"
            ],

            HousingType_F_mean: [
                "#eff3ff",
                "#bdd7e7",
                "#6baed6",
                "#3182bd",
                "#08519c"
            ],

            neighbourhood_diversity_mean: [
                "#f2f0f7",
                "#cbc9e2",
                "#9e9ac8",
                "#756bb1",
                "#54278f"
            ],

            neighbourhood_interact_diversity_mean: [
                "#edf8e9",
                "#bae4b3",
                "#74c476",
                "#31a354",
                "#006d2c"
            ]
        };

        function getCurrentColourScale() {
            return colourThemes[selectedIndex] ?? [];
        }

        // Grey for missing data
        const noDataColour = "#bdbdbd";




        // ---------------------------------------------------------
        // 4. Helper functions
        // ---------------------------------------------------------

        // Standardise planning-area names so the GeoJSON and data file can be matched reliably.
        function normaliseAreaName(value) {
            return String(value ?? "")
                .trim()
                .toUpperCase();
        }


        // Return true only for values that can safely be treated as finite numbers.
        function isValidNumber(value) {
            return (
                value !== null &&
                value !== undefined &&
                value !== "" &&
                Number.isFinite(Number(value))
            );
        }


        function formatNumber(value) {
            if (!isValidNumber(value)) {
                return "No data";
            }

            return Number(value).toFixed(2);
        }


        function formatMean(mean) {
            if (!isValidNumber(mean)) {
                return "No data";
            }

            return Number(mean).toFixed(2);
        }


        // ---------------------------------------------------------
        // 5. Calculate quantile colour breaks
        // ---------------------------------------------------------

        // Split valid values into five roughly equal-sized groups using the 20th, 40th, 60th and 80th percentiles.
        function calculateQuantileBreaks(variableName) {
            const values = Object.values(diversityLookup)
                .map(function (row) {
                return row[variableName];
                })
                .filter(function (value) {
                return isValidNumber(value);
                })
                .map(function (value) {
                return Number(value);
                })
                .sort(function (a, b) {
                return a - b;
                });

            if (values.length === 0) {
                return [];
            }

            // Interpolate between adjacent sorted values when the percentile falls between them.
            function quantile(probability) {
                const position = (values.length - 1) * probability;
                const lowerIndex = Math.floor(position);
                const upperIndex = Math.ceil(position);

                if (lowerIndex === upperIndex) {
                return values[lowerIndex];
                }

                const proportion = position - lowerIndex;

                return (
                values[lowerIndex] +
                proportion *
                (values[upperIndex] - values[lowerIndex])
                );
            }

            return [
                quantile(0.20),
                quantile(0.40),
                quantile(0.60),
                quantile(0.80)
            ];
        }


        // ---------------------------------------------------------
        // 6. Return a colour for each value
        // ---------------------------------------------------------

        // Convert a numeric value into the appropriate colour category.
        function getColour(value) {
            if (!isValidNumber(value)) {
                return noDataColour;
            }

            const colourScale = getCurrentColourScale();
            const number = Number(value);

            if (currentBreaks.length !== 4) {
                return colourScale[2];
            }

            if (number <= currentBreaks[0]) {
                return colourScale[0];
            }

            if (number <= currentBreaks[1]) {
                return colourScale[1];
            }

            if (number <= currentBreaks[2]) {
                return colourScale[2];
            }

            if (number <= currentBreaks[3]) {
                return colourScale[3];
            }

            return colourScale[4];
        }


        // ---------------------------------------------------------
        // 7. Polygon style
        // ---------------------------------------------------------

        // Build the default visual style for each planning-area polygon.
        function polygonStyle(feature) {
            const planningArea = normaliseAreaName(
                feature.properties?.planning_area ??
                feature.properties?.pln_area_n
            );

            const areaData = diversityLookup[planningArea];

            if (!areaData) {
                return {
                    color: "#666666",
                    weight: 1.3,
                    opacity: 1,
                    fillColor: noDataColour,
                    fillOpacity: 0.9
                };
            }

            if (!selectedIndex) {
                return {
                    color: "#333333",
                    weight: 1.3,
                    opacity: 1,
                    fillColor: "#ffffff",
                    fillOpacity: 0.12
                };
            }

            const value = areaData?.[selectedIndex];

            return {
                color: "#333333",
                weight: 1.3,
                opacity: 1,
                fillColor: getColour(value),
                fillOpacity: 0.9
            };
        }


        // ---------------------------------------------------------
        // 8. Left-panel content
        // ---------------------------------------------------------

        // Measures shown in the left information panel.
        const panelMeasures = [
            {
                key: "Household_F_mean",
                label: "Household income diversity"
            },
            {
                key: "HousingType_F_mean",
                label: "Housing-type diversity"
            },
            {
                key: "neighbourhood_diversity_mean",
                label: "Perceived neighbourhood diversity"
            },
            {
                key: "neighbourhood_interact_diversity_mean",
                label: "Neighbourhood interaction diversity"
            },
            {
                key: "belonging_singapore_mean",
                label: "Belongingness"
            },
            {
                key: "life_satisfaction_mean",
                label: "Life satisfaction"
            },
            {
                key: "happy_mean",
                label: "Happiness"
            },
            {
                key: "health_mean",
                label: "Physical health"
            },
            {
                key: "income_unequal_mean",
                label: "Income inequality"
            },
            {
                key: "walkscore_mean",
                label: "Walkability"
            }
        ];

        let measureStats = {};
        let currentPanelAreaName = null;
        let currentPanelAreaData = null;
        let expandedMeasureKey = null;


        // Find the minimum and maximum values used by each range card.
        function calculateStatsForMeasure(variableName) {
            const values = Object.values(diversityLookup)
                .map(function (row) {
                    return row[variableName];
                })
                .filter(function (value) {
                    return isValidNumber(value);
                })
                .map(function (value) {
                    return Number(value);
                });

            if (values.length === 0) {
                return {
                    min: null,
                    max: null
                };
            }

            return {
                min: Math.min(...values),
                max: Math.max(...values)
            };
        }

        // Precalculate all min/max values once after the data file is loaded.
        function buildMeasureStats() {
            measureStats = {};

            panelMeasures.forEach(function (measure) {
                measureStats[measure.key] =
                    calculateStatsForMeasure(measure.key);
            });

            measureStats.n = calculateStatsForMeasure("n");
        }

        function formatPanelValue(value, wholeNumber = false) {
            if (!isValidNumber(value)) {
                return "No data";
            }

            return wholeNumber
                ? Number(value)
                : Number(value).toFixed(2);
        }

        // Express a value as a percentage of its measure's observed minimum-to-maximum range.
        function getPositionPercent(value, stats) {
            if (!isValidNumber(value) || !stats) {
                return 0;
            }

            const number = Number(value);
            const min = stats.min;
            const max = stats.max;

            if (!Number.isFinite(min) || !Number.isFinite(max)) {
                return 0;
            }

            if (max === min) {
                return 50;
            }

            const percent = ((number - min) / (max - min)) * 100;

            return Math.max(0, Math.min(100, percent));
        }

        // Generate the HTML for one expandable measure card in the side panel.
        function createRangeCard(measure, areaData, highlighted = false) {
            const value = areaData?.[measure.key];
            const stats = measureStats[measure.key];
            const shouldExpand =
                expandedMeasureKey
                    ? measure.key === expandedMeasureKey
                    : highlighted;

            const expandedClass =
                shouldExpand ? " expanded" : "";

            if (!isValidNumber(value) || !stats || !isValidNumber(stats.min) || !isValidNumber(stats.max)) {
                return `
                    <div class="metric-card${highlighted ? " highlighted" : ""}${expandedClass}" data-measure-key="${measure.key}">
                        <button class="metric-header" type="button" aria-expanded="${shouldExpand}">
                            <span class="metric-title">${measure.label}</span>
                            <span class="metric-chevron">›</span>
                        </button>
                        <div class="metric-details">
                            <div class="metric-value-line">No data available for this measure.</div>
                        </div>
                    </div>
                `;
            }

            const displayValue = formatPanelValue(value);
            const rawPositionPercent =
                getPositionPercent(value, stats);

            // Keep the marker slightly inside the bar so it is not clipped at either edge.
            const positionPercent =
                Math.max(
                    1.5,
                    Math.min(98.5, rawPositionPercent)
                );
                
            const minLabel = formatPanelValue(stats.min);
            const maxLabel = formatPanelValue(stats.max);

            return `
                <div class="metric-card${highlighted ? " highlighted" : ""}${expandedClass}" data-measure-key="${measure.key}">
                    <button class="metric-header" type="button" aria-expanded="${highlighted}">
                        <span class="metric-title">${measure.label}</span>
                        <span class="metric-chevron">›</span>
                    </button>

                    <div class="metric-details">
                        <div class="metric-value-line">
                            <strong>${displayValue}</strong>
                        </div>

                        <div class="metric-bar-wrap">
                            <div class="metric-marker" style="left:${positionPercent}%;"></div>
                            <div class="metric-hover-marker"></div>
                            <div class="metric-bar"></div>
                        </div>

                        <div class="metric-position-label">
                            ${currentPanelAreaName ?? "Selected area"}: ${positionPercent.toFixed(0)}%
                        </div>

                        <div class="metric-hover-label"></div>

                        <div class="metric-scale">
                            <span>Low: ${minLabel}</span>
                            <span>High: ${maxLabel}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        // Add click behaviour after the cards have been inserted into the page.
        function activateMetricCards() {
            const headers = document.querySelectorAll(
                "#info-panel .metric-header"
            );

            headers.forEach(function (header) {
                header.addEventListener("click", function () {
                    const clickedCard =
                        header.closest(".metric-card");

                    const measureKey =
                        clickedCard.dataset.measureKey;

                    const currentlyExpanded =
                        document.querySelector(
                            "#info-panel .metric-card.expanded"
                        );

                    const isAlreadyOpen =
                        clickedCard.classList.contains("expanded");

                    if (currentlyExpanded) {
                        currentlyExpanded.classList.remove("expanded");

                        const currentHeader =
                            currentlyExpanded.querySelector(
                                ".metric-header"
                            );

                        currentHeader?.setAttribute(
                            "aria-expanded",
                            "false"
                        );
                    }

                    if (isAlreadyOpen) {
                        expandedMeasureKey = null;
                        return;
                    }

                    clickedCard.classList.add("expanded");

                    header.setAttribute(
                        "aria-expanded",
                        "true"
                    );

                    expandedMeasureKey = measureKey;
                });
            });
        }

        function createSampleSizeRow(areaData) {
            return `
                <div class="simple-measure-row">
                    <span>Sample size</span>
                    <strong>${formatPanelValue(areaData?.n, true)}</strong>
                </div>
            `;
        }

        // Build all side-panel content and move the currently mapped measure to the top.
        function createAllMeasuresContent(planningArea, areaData) {
            if (!areaData) {
                return `
                    <div class="info-panel-empty">
                        No data are available for this planning area.
                    </div>
                `;
            }

            const selectedMeasureNote = selectedIndex
                ? `
                    <div class="selected-measure-note">
                        Currently displayed map measure: <strong>${diversityIndices[selectedIndex]?.label ?? selectedIndex}</strong>
                    </div>
                `
                : "";

            const orderedMeasures = panelMeasures.slice().sort(function (a, b) {
                if (a.key === selectedIndex) return -1;
                if (b.key === selectedIndex) return 1;
                return 0;
            });

            const measureCards = orderedMeasures
                .map(function (measure) {
                    return createRangeCard(
                        measure,
                        areaData,
                        measure.key === selectedIndex
                    );
                })
                .join("");

            return `
                ${selectedMeasureNote}
                ${measureCards}
                ${createSampleSizeRow(areaData)}
            `;
        }


        // Move the brown comparison marker when the user hovers over another polygon.
        function updateHoveredAreaInPanel(hoveredAreaName, hoveredAreaData) {
            if (!currentPanelAreaData || !hoveredAreaData) {
                return;
            }

            document.querySelectorAll("#info-panel .metric-card").forEach(function (card) {
                const measureKey = card.dataset.measureKey;
                const stats = measureStats[measureKey];
                const hoveredValue = hoveredAreaData?.[measureKey];
                const marker = card.querySelector(".metric-hover-marker");
                const label = card.querySelector(".metric-hover-label");

                if (!marker || !label || !isValidNumber(hoveredValue) || !stats) {
                    if (marker) marker.style.display = "none";
                    if (label) label.style.display = "none";
                    return;
                }

                const rawHoverPercent =
                    getPositionPercent(
                        hoveredValue,
                        stats
                    );

                const hoverPercent =
                    Math.max(
                        1.5,
                        Math.min(98.5, rawHoverPercent)
                    );

                marker.style.left = `${hoverPercent}%`;
                marker.style.display = "block";

                //label.textContent = `${hoveredAreaName}: ${formatPanelValue(hoveredValue)} (${hoverPercent.toFixed(0)}%)`;
                label.style.display = "block";
            });
        }

        // Remove all hover comparison markers when the cursor leaves a polygon.
        function clearHoveredAreaInPanel() {
            document.querySelectorAll("#info-panel .metric-hover-marker").forEach(function (marker) {
                marker.style.display = "none";
            });

            document.querySelectorAll("#info-panel .metric-hover-label").forEach(function (label) {
                label.style.display = "none";
                label.textContent = "";
            });
        }


        // Show the selected planning area and its measures in the left panel.
        function openInfoPanel(planningArea, areaData) {

            currentPanelAreaName = planningArea;
            currentPanelAreaData = areaData;

            const panel =
                document.getElementById("info-panel");

            const title =
                document.getElementById("info-panel-title");

            const content =
                document.getElementById("info-panel-content");


            title.textContent = planningArea;

            content.innerHTML =
                createAllMeasuresContent(
                    planningArea,
                    areaData
                );

            activateMetricCards();

            content.classList.remove("info-panel-empty");

            panel.classList.add("open");
        }

        // Rebuild the open panel when the selected map measure changes.
        function refreshOpenInfoPanel() {
            if (
                !currentPanelAreaName ||
                !currentPanelAreaData
            ) {
                return;
            }

            const content =
                document.getElementById(
                    "info-panel-content"
                );

            content.innerHTML =
                createAllMeasuresContent(
                    currentPanelAreaName,
                    currentPanelAreaData
                );

            activateMetricCards();
        }


        // Update a polygon tooltip so it reflects the currently selected map measure.
        function updateLayerTooltip(
            layer,
            displayName,
            areaData
        ) {
            let tooltipHtml =
                `<strong>${displayName}</strong>`;

            if (selectedIndex) {
                const label =
                    diversityIndices[selectedIndex]?.label ??
                    selectedIndex;

                const value =
                    areaData?.[selectedIndex];

                tooltipHtml +=
                    `<br>${label}: ${formatNumber(value)}`;
            }

            layer.setTooltipContent(tooltipHtml);
        }


        // ---------------------------------------------------------
        // 9. Add tooltip, popup and hover behaviour
        // ---------------------------------------------------------
        let selectedPolygonLayer = null;

        // Attach tooltip, hover, selection, panel update and zoom behaviour to each polygon.
        function onEachPlanningArea(feature, layer) {
            const planningArea = normaliseAreaName(
                feature.properties?.planning_area ??
                feature.properties?.pln_area_n
            );

            const displayName =
                planningArea || "Unknown planning area";

            const areaData = diversityLookup[planningArea];

            layer.bindTooltip(
                `<strong>${displayName}</strong>`,
                {
                sticky: true,
                direction: "top"
                }
            );

            updateLayerTooltip(
                layer,
                displayName,
                areaData
            );

            layer.on({
                // Temporarily emphasise the polygon under the cursor.
                mouseover: function (event) {
                    const layer = event.target;

                    if (layer !== selectedPolygonLayer) {
                        layer.setStyle({
                            color: "#000000",
                            weight: 3
                        });
                    }

                    layer.bringToFront();

                    updateHoveredAreaInPanel(
                        displayName,
                        areaData
                    );
                },
                
                // Restore the normal style when the cursor leaves the polygon.
                mouseout: function (event) {
                    const layer = event.target;

                    if (
                        planningAreaLayer &&
                        layer !== selectedPolygonLayer
                    ) {
                        planningAreaLayer.resetStyle(layer);
                    }

                    clearHoveredAreaInPanel();
                },

                // Select the polygon, update the panel and zoom to the clicked location.
                click: function (event) {
                    const clickedLayer = event.target;
                    const clickedPoint = event.latlng;

                    if (event.originalEvent) {
                        L.DomEvent.stopPropagation(
                            event.originalEvent
                        );
                    }

                    // Restore the previous polygon
                    if (
                        selectedPolygonLayer &&
                        selectedPolygonLayer !== clickedLayer
                    ) {
                        planningAreaLayer.resetStyle(
                            selectedPolygonLayer
                        );
                    }

                    selectedPolygonLayer = clickedLayer;

                    // Red border for the selected polygon
                    clickedLayer.setStyle({
                        color: "#d7191c",
                        weight: 5,
                        opacity: 1,
                        
                        fillColor: areaData
                            ? clickedLayer.options.fillColor
                            : noDataColour,

                        fillOpacity: areaData
                            ? (selectedIndex ? 0.9 : 0.12)
                            : 0.9
                    });

                    clickedLayer.bringToFront();

                    // Update the side panel first
                    openInfoPanel(
                        displayName,
                        areaData
                    );

                    // Zoom around the exact cursor position.
                    // This keeps the clicked geographic point under the cursor
                    // instead of moving it to a different visual centre.

                    // map.setZoomAround( event.containerPoint, 13 );

                    map.flyTo(
                        event.latlng,
                        13,
                        {
                            animate: true,
                            duration: 0.2
                        }
                    );

                }
                
            });
        }


        // ---------------------------------------------------------
        // 10. Add dropdown control
        // ---------------------------------------------------------

        const indexControl = L.control({
            position: "topright"
        });

        // Create the dropdown control when Leaflet adds it to the map.
        indexControl.onAdd = function () {
            const container = L.DomUtil.create(
                "div",
                "index-control"
            );

            const options = Object.entries(diversityIndices)
                .map(function ([variableName, settings]) {
                return `
                    <option value="${variableName}">
                        ${settings.label}
                    </option>
                `;
                })
                .join("");

            container.innerHTML = `
                <label for="index-select">
                    Colour polygons by:
                </label>

                <select id="index-select">
                    <option value="">Default</option>
                    ${options}
                </select>
            `;

            L.DomEvent.disableClickPropagation(container);
            L.DomEvent.disableScrollPropagation(container);

            return container;
        };

        indexControl.addTo(map);


        // ---------------------------------------------------------
        // 11. Add legend
        // ---------------------------------------------------------

        const legend = L.control({
            position: "bottomright"
        });

        // Create an empty legend container; updateLegend() fills its contents.
        legend.onAdd = function () {
            const container = L.DomUtil.create(
                "div",
                "map-legend"
            );

            container.id = "map-legend-content";

            return container;
        };

        legend.addTo(map);


        // Rebuild the legend to match the selected measure and its quantile cut-offs.
        function updateLegend() {
            const legendContainer = document.getElementById(
                "map-legend-content"
            );

            if (!legendContainer) {
                return;
            }

            // Hide the legend when "No colouring" is selected
            if (!selectedIndex) {
                legendContainer.style.display = "none";
                legendContainer.innerHTML = "";
                return;
            }

            legendContainer.style.display = "block";

            const label =
                diversityIndices[selectedIndex]?.label ??
                selectedIndex;

            const colourScale = getCurrentColourScale();

            if (currentBreaks.length !== 4) {
                legendContainer.innerHTML = `
                    <div class="map-legend-title">
                        ${label}
                    </div>

                    <div>
                        No valid data
                    </div>

                    <div>
                        <span
                            class="legend-colour"
                            style="background:${noDataColour};"
                        ></span>
                        No data
                    </div>
                `;

                return;
            }

            legendContainer.innerHTML = `
                <div class="map-legend-title">
                    ${label}
                </div>

                <div>
                    <span
                        class="legend-colour"
                        style="background:${colourScale[4]};"
                    ></span>
                    &gt; ${currentBreaks[3].toFixed(2)}
                </div>

                <div>
                    <span
                        class="legend-colour"
                        style="background:${colourScale[3]};"
                    ></span>
                    &gt; ${currentBreaks[2].toFixed(2)}
                    to ${currentBreaks[3].toFixed(2)}
                </div>

                <div>
                    <span
                        class="legend-colour"
                        style="background:${colourScale[2]};"
                    ></span>
                    &gt; ${currentBreaks[1].toFixed(2)}
                    to ${currentBreaks[2].toFixed(2)}
                </div>

                <div>
                    <span
                        class="legend-colour"
                        style="background:${colourScale[1]};"
                    ></span>
                    &gt; ${currentBreaks[0].toFixed(2)}
                    to ${currentBreaks[1].toFixed(2)}
                </div>


                <div>
                    <span
                        class="legend-colour"
                        style="background:${colourScale[0]};"
                    ></span>
                    ≤ ${currentBreaks[0].toFixed(2)}
                </div>

                
                

                

                

                <div>
                    <span
                        class="legend-colour"
                        style="background:${noDataColour};"
                    ></span>
                    No data
                </div>
            `;
        }


        // ---------------------------------------------------------
        // 12. Recolour polygons when dropdown changes
        // ---------------------------------------------------------

        // Recalculate breaks, recolour polygons, preserve selection, and refresh tooltips.
        function updateMapColours() {
            if (selectedIndex) {
                currentBreaks =
                    calculateQuantileBreaks(selectedIndex);
            } else {
                currentBreaks = [];
            }

            if (planningAreaLayer) {
                planningAreaLayer.eachLayer(function (layer) {
                    layer.setStyle(
                        polygonStyle(layer.feature)
                    );

                    if (layer === selectedPolygonLayer) {
                        layer.setStyle({
                            color: "#d7191c",
                            weight: 5,
                            opacity: 1
                        });

                        layer.bringToFront();
                    }

                    const planningArea = normaliseAreaName(
                        layer.feature.properties?.planning_area ??
                        layer.feature.properties?.pln_area_n
                    );

                    const displayName =
                        planningArea || "Unknown planning area";

                    const areaData =
                        diversityLookup[planningArea];

                    updateLayerTooltip(
                        layer,
                        displayName,
                        areaData
                    );
                });
            }

            updateLegend();
        }


        // ---------------------------------------------------------
        // 13. Load GeoJSON and diversity data
        // ---------------------------------------------------------

        const infoPanel =
            document.getElementById("info-panel");


        

        // Load the boundary file and the planning-area data in parallel.
        Promise.all([
            fetch("./singapore_planning_areas_polygon.geojson")
                .then(function (response) {
                if (!response.ok) {
                    throw new Error(
                        "Planning-area GeoJSON could not be loaded. " +
                        `HTTP status: ${response.status}`
                    );
                }

                return response.json();
                }),

            fetch("./planning_area_diversity.json")
                .then(function (response) {
                if (!response.ok) {
                    throw new Error(
                        "Diversity JSON could not be loaded. " +
                        `HTTP status: ${response.status}`
                    );
                }

                return response.json();
                })
        ])
        .then(function ([geojsonData, diversityData]) {

            // Create a lookup object using planning-area names
            // Convert the array of data rows into a lookup keyed by planning-area name.
            diversityData.forEach(function (row, index) {
                const planningArea = normaliseAreaName(
                row.Planning_Area ?? row["Planning Area"]
                );

                if (planningArea === "") {
                console.warn(
                    `Skipping diversity row ${index + 1} ` +
                    "because Planning_Area is blank:",
                    row
                );

                return;
                }

                diversityLookup[planningArea] = row;
            });
            
            buildMeasureStats();

            // Calculate initial colour groups
            currentBreaks = selectedIndex
                ? calculateQuantileBreaks(selectedIndex)
                : [];


            // Create the planning-area polygons
            planningAreaLayer = L.geoJSON(
                geojsonData,
                {
                    style: polygonStyle,
                    onEachFeature: onEachPlanningArea,
                    bubblingMouseEvents: false
                }

                

            ).addTo(map);


            // Scale the initial map view to the available map width
            setTimeout(function () {
                setViewFromTopLeft();
            }, 100);

            let resizeTimer;

            // Debounce resize events so the map is not continuously recalculated.
            window.addEventListener("resize", function () {
                clearTimeout(resizeTimer);

                resizeTimer = setTimeout(function () {
                    setViewFromTopLeft();
                }, 150);
            });

            // Set up dropdown
            const indexSelect =
                document.getElementById("index-select");

            indexSelect.value = selectedIndex;

            // Update the map and open information panel whenever the dropdown changes.
            indexSelect.addEventListener(
                "change",
                function () {
                    selectedIndex = indexSelect.value;

                    updateMapColours();
                    refreshOpenInfoPanel();

                }
            );


            // Show initial legend
            updateLegend();
        })
        .catch(function (error) {
            console.error(
                "Map loading error:",
                error
            );

            alert(
                "The map data could not be loaded:\n\n" +
                error.message
            );
        });
    </script>
    </body>
</html>
